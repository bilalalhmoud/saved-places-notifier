name: SavedPlacesNotifier
options:
  bundleIdPrefix: com.bilalalhmoud
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  SavedPlacesCore:
    path: Core

targets:
  SavedPlacesNotifier:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
      - path: App/Resources
    dependencies:
      - package: SavedPlacesCore
        product: SavedPlacesCore
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Nearby Saved
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSupportsIndoorMaps: false
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: "Used to alert you when you are near one of your saved places."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Allows the app to notify you about nearby saved places in the background, using battery-efficient location monitoring."
        NSLocationAlwaysUsageDescription: "Allows the app to notify you about nearby saved places in the background."
        UIBackgroundModes:
          - location
        LSApplicationQueriesSchemes:
          - comgooglemaps
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bilalalhmoud.savedplacesnotifier
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  SavedPlacesNotifierTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: App/Tests
    dependencies:
      - target: SavedPlacesNotifier
      - package: SavedPlacesCore
        product: SavedPlacesCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bilalalhmoud.savedplacesnotifier.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  SavedPlacesNotifier:
    build:
      targets:
        SavedPlacesNotifier: all
        SavedPlacesNotifierTests: [test]
    test:
      targets:
        - SavedPlacesNotifierTests
