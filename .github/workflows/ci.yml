name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core package (build + unit tests)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build & test SavedPlacesCore
        working-directory: Core
        run: swift test --parallel

  app:
    name: iOS app (generate + build + test)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build app (iOS Simulator, no signing)
        run: |
          set -o pipefail
          xcodebuild build \
            -project SavedPlacesNotifier.xcodeproj \
            -scheme SavedPlacesNotifier \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath build
      - name: Pick an available iPhone simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | jq -r '[.devices[][] | select(.name | test("iPhone"))][0].udid')
          echo "Using simulator UDID: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project SavedPlacesNotifier.xcodeproj \
            -scheme SavedPlacesNotifier \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
      - name: Package simulator build
        run: |
          APP_PATH=$(find build/Build/Products -name "*.app" -maxdepth 3 | head -n 1)
          echo "Built: $APP_PATH"
          cd "$(dirname "$APP_PATH")" && zip -r "$GITHUB_WORKSPACE/SavedPlacesNotifier-simulator.zip" "$(basename "$APP_PATH")"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SavedPlacesNotifier-simulator-app
          path: SavedPlacesNotifier-simulator.zip
          if-no-files-found: warn
